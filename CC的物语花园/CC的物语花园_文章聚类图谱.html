// ==================== 交互 ====================
function showTooltip(event, d) {
  var tip = document.getElementById('tooltip');
  tip.querySelector('.tt-title').textContent = d.title;
  var catEl = tip.querySelector('.tt-category');
  catEl.textContent = d.primary;
  catEl.style.background = getColor(d.primary) + '33';
  catEl.style.color = getColor(d.primary);
  tip.querySelector('.tt-topics').innerHTML = d.topics.map(function(t){ return '<span class="tt-tag">'+t+'</span>'; }).join('');
  tip.style.opacity = 1;
  d3.select(event.currentTarget).transition().duration(150)
    .attr('r', d.r*1.5).attr('stroke', getColor(d.primary)).attr('stroke-width', 3);
}

function moveTooltip(event) {
  var tip = document.getElementById('tooltip');
  var r = document.getElementById('graph-container').getBoundingClientRect();
  var x = event.clientX - r.left + 18;
  var y = event.clientY - r.top - 30;
  if (x + 370 > r.width) x = event.clientX - r.left - 380;
  if (y < 10) y = 10;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip(event, d) {
  document.getElementById('tooltip').style.opacity = 0;
  d3.select(event.currentTarget).transition().duration(200)
    .attr('r', d.r).attr('stroke','#1a1a2e').attr('stroke-width',1.5);
}

function openFile(event, d) {
  event.stopPropagation();
  var fp = BASE_PATH + d.filename;
  window.open('file:///' + fp.replace(/\\/g,'/'), '_blank');
}

function highlightNode(event, d) {
  event.stopPropagation();
  nodeElements.classed('highlighted', false);
  var connected = new Set();
  connected.add(d.id);
  linkElements.each(function(l) {
    if (l.source.id === d.id) connected.add(l.target.id);
    if (l.target.id === d.id) connected.add(l.source.id);
  });
  nodeElements.transition().duration(300)
    .style('opacity', function(n){ return connected.has(n.id) ? 1 : 0.12; });
  linkElements.transition().duration(300)
    .style('stroke-opacity', function(l){ return (l.source.id===d.id||l.target.id===d.id) ? 0.8 : 0.03; });
  labelElements.transition().duration(300)
    .style('opacity', function(n){ return connected.has(n.id) ? 0.9 : 0; });
  svg.transition().duration(600).call(zoom.transform,
    d3.zoomIdentity
      .translate(document.getElementById('graph-container').clientWidth/2, document.getElementById('graph-container').clientHeight/2)
      .scale(1.2).translate(-d.x, -d.y)
  );
}

function resetHighlight() {
  nodeElements.classed('highlighted', false);
  nodeElements.transition().duration(400).style('opacity', 0.85);
  linkElements.transition().duration(400).style('stroke-opacity', 0.3);
  labelElements.transition().duration(400)
    .style('opacity', function(d){ return d.topics.length>=4 ? 0.7 : 0; });
  updateVisibility();
}

    .style('opacity', function(n){ return matchedIds.has(n.id) ? 1 : 0.06; });
  linkElements.transition().duration(300)
    .style('stroke-opacity', function(l){ return (matchedIds.has(l.source.id)&&matchedIds.has(l.target.id)) ? 0.6 : 0.01; });
  labelElements.transition().duration(300)
    .style('opacity', function(n){ return matchedIds.has(n.id) ? 0.9 : 0; })
    .style('display', function(n){ return matchedIds.has(n.id) ? 'block' : 'none'; });
  if (matched.length>0) {
    svg.transition().duration(500).call(zoom.transform,
      d3.zoomIdentity
        .translate(document.getElementById('graph-container').clientWidth/2, document.getElementById('graph-container').clientHeight/2)
        .scale(1.5).translate(-matched[0].x, -matched[0].y)
    );
  }
});

// ==================== 拖拽 ====================
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ==================== 窗口自适应 ====================
window.addEventListener('resize', function() {
  if (!svg) return;
  var c = document.getElementById('graph-container');
  svg.attr('width', c.clientWidth).attr('height', c.clientHeight);
  simulation.force('center', d3.forceCenter(c.clientWidth/2, c.clientHeight/2));
  simulation.alpha(0.3).restart();
});

// ==================== 启动 ====================
buildLegend();

loadD3().then(function() {
  try {
    buildGraph();
  } catch(e) {
    showError('图谱构建失败: ' + e.message);
    console.error(e);
  }
}).catch(function(e) {
  showError(e.message || 'D3.js 加载失败');
});

})();
</script>
</body>
</html>
