<style>
:root {
  --bg: #060612;
  --panel-bg: rgba(10,10,28,0.94);
  --border: rgba(255,255,255,0.07);
  --text: #bbb;
  --text-dim: #555;
  --text-bright: #eee;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei","PingFang SC",sans-serif;
  background: var(--bg);
  overflow:hidden; height:100vh; width:100vw;
  color: var(--text);
}
#container { position:relative; width:100%; height:100%; }
svg { width:100%; height:100%; display:block; }

/* Header bar */
#header {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  z-index:100; text-align:center; pointer-events:none;
}
#header h1 {
  font-size:18px; font-weight:700;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff6b9d);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#header .breadcrumb { font-size:10px; color:var(--text-dim); margin-top:2px; pointer-events:auto; }
#header .breadcrumb span { color:#7b2ff7; cursor:pointer; }
#header .breadcrumb span:hover { text-decoration:underline; }

/* Sidebar */
#sidebar {
  position:absolute; top:85px; left:10px;
  background:var(--panel-bg); border:1px solid var(--border);
  border-radius:10px; padding:10px; width:230px;
  max-height:calc(100vh - 105px); overflow-y:auto;
  backdrop-filter:blur(16px); z-index:100;
  font-size:10px;
}
#sidebar h3 { font-size:11px; color:var(--text-bright); margin-bottom:5px; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:6px; }
.stat-item {
  background:rgba(255,255,255,0.02); border-radius:5px; padding:5px; text-align:center;
}
.stat-item .num { font-size:13px; font-weight:700; color:#7b2ff7; }
.stat-item .label { font-size:8px; color:var(--text-dim); }

#search-box {
  width:100%; padding:6px 8px; border-radius:5px;
  border:1px solid var(--border); background:rgba(255,255,255,0.03);
  color:var(--text-bright); font-size:10px; outline:none; margin-bottom:6px;
}
#search-box:focus { border-color:#7b2ff7; }

#category-list { list-style:none; }
#category-list li {
  display:flex; align-items:center; gap:5px;
  padding:4px 6px; border-radius:5px; cursor:pointer;
  margin:1px 0; font-size:10px; transition:all 0.15s;
}
#category-list li:hover { background:rgba(255,255,255,0.05); }
#category-list li.active { background:rgba(123,47,247,0.15); }
.cat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cat-info { flex:1; display:flex; justify-content:space-between; }
.cat-name { color:#bbb; }
.cat-count { color:var(--text-dim); font-size:9px; }

/* Detail */
#detail-panel {
  position:absolute; top:85px; right:10px;
  background:var(--panel-bg); border:1px solid var(--border);
  border-radius:10px; padding:14px; width:280px;
  max-height:calc(100vh - 105px); overflow-y:auto;
  backdrop-filter:blur(16px); z-index:100;
  display:none; font-size:11px;
}
#detail-panel.show { display:block; }
#detail-panel h3 { font-size:12px; color:var(--text-bright); line-height:1.4; margin-bottom:4px; word-break:break-all; }
#detail-panel .badge {
  display:inline-block; padding:1px 6px; border-radius:5px;
  font-size:9px; color:#fff; margin-bottom:5px;
}
#detail-panel .preview {
  color:#999; line-height:1.5; font-size:10px;
  padding:7px; background:rgba(255,255,255,0.015); border-radius:5px;
  margin:5px 0; max-height:100px; overflow-y:auto;

#detail-panel .section-title { color:var(--text-dim); font-size:8px; margin:10px 0 3px; }
#detail-panel .tag {

  border-radius:4px; background:rgba(255,255,255,0.03); font-size:9px; color:#aaa;

#detail-panel .tag.link { cursor:pointer; }
#detail-panel .tag.link:hover { background:rgba(123,47,247,0.2); color:#ddd; }
#close-detail { position:absolute; top:6px; right:10px; background:none; border:none; color:var(--text-dim); font-size:14px; cursor:pointer; }

/* Controls */
#controls {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:5px; z-index:100;
}
#controls button {
  padding:5px 11px; border-radius:5px;
  border:1px solid var(--border);
  background:var(--panel-bg); color:#888;
  cursor:pointer; font-size:10px; transition:all 0.2s;
  backdrop-filter:blur(10px);
}
#controls button:hover { background:rgba(123,47,247,0.12); border-color:#7b2ff7; color:#ddd; }
#controls button.active { background:rgba(123,47,247,0.18); border-color:#7b2ff7; color:#fff; }

/* Tooltip */
#tooltip {
  position:absolute; pointer-events:none;
  background:rgba(6,6,18,0.96); border:1px solid rgba(255,255,255,0.1);
  border-radius:7px; padding:6px 10px; color:#ccc;
  font-size:10px; max-width:200px; z-index:200;
  display:none; backdrop-filter:blur(10px); line-height:1.3;
}
#tooltip .tt-title { color:#fff; font-weight:600; }
#tooltip .tt-meta { color:var(--text-dim); font-size:9px; }

#legend {
  position:absolute; bottom:52px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:100; font-size:9px; color:var(--text-dim);
}
#zoom-hint {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
  color:var(--text-dim); font-size:8px; z-index:90; pointer-events:none; opacity:0.3;
}
</style>
</head>

window.addEventListener('DOMContentLoaded', () => {
  if (typeof CLUSTER_DATA !== 'undefined' && CLUSTER_DATA !== null) init(CLUSTER_DATA);

function init(data) {
  document.getElementById('loading').style.display = 'none';
  hierarchy = data.hierarchy;
  crossLinks = data.crossLinks;
  
  document.getElementById('st-domains').textContent = hierarchy.children.length;
  document.getElementById('st-articles').textContent = hierarchy.children.reduce((s,c)=>s+c.children.length,0);
  document.getElementById('st-links').textContent = crossLinks.length;
  const allArts = hierarchy.children.flatMap(c => c.children);
  const avg = allArts.reduce((s,a)=>s+(a.connections||0),0) / Math.max(1, allArts.length);
  document.getElementById('st-avg').textContent = avg.toFixed(1);

  // Sidebar
  const catList = document.getElementById('category-list');
  hierarchy.children.sort((a,b)=>b.children.length-a.children.length).forEach(cat => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="cat-dot" style="background:${cat.color}"></span>
      <span class="cat-info"><span class="cat-name">${cat.icon} ${cat.name}</span>
      <span class="cat-count">${cat.children.length}</span></span>`;
    li.addEventListener('click', () => zoomToCategory(cat.name, li));
    li.dataset.cat = cat.name;
    catList.appendChild(li);
  });

  document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    q ? highlightArticles(q) : resetHighlights();
  });

  W = document.getElementById('container').clientWidth;
  H = document.getElementById('container').clientHeight;
  svg = d3.select('#graph').attr('viewBox',[0,0,W,H]);
  g = svg.append('g');
  zoom = d3.zoom().scaleExtent([0.15, 8]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  renderOverview();
}

function renderOverview() {
  currentZoom = null;
  g.selectAll('*').remove();
  allArticleNodes = {};
  document.querySelectorAll('#category-list li').forEach(l => l.classList.remove('active'));
  document.getElementById('detail-panel').classList.remove('show');
  document.getElementById('breadcrumb').innerHTML = '<span onclick="zoomOut()">18个知识领域</span>';
  document.querySelectorAll('#controls button').forEach((b,i) => b.classList.toggle('active', i===0));

  // Clone and add sizes
  const data = { name:'root', children: hierarchy.children.map(cat => ({
    ...cat,
    value: Math.max(30, cat.children.length * 4),
    children: cat.children.map(a => ({
      ...a,
      value: Math.max(2, Math.sqrt(a.connections||1) * 3)
    }))
  }))};

  const root = d3.hierarchy(data).sum(d => d.value).sort((a,b) => b.value - a.value);
  packLayout = d3.pack().size([W, H]).padding(4);
  packLayout(root);

  // Collect coords
  root.leaves().forEach(d => {
    if (d.data.id !== undefined) {
      allArticleNodes[d.data.id] = { x:d.x, y:d.y, r:d.r, cat:d.parent.data.name, color:d.parent.data.color };
    }
  });

  // === Draw category backgrounds ===
  const catG = g.selectAll('g.cat-bg')
    .data(root.children).join('g').attr('class','cat-bg');

  // Glow
  catG.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r+4)
    .attr('fill','none').attr('stroke',d=>d.data.color).attr('stroke-width',2)
    .attr('stroke-opacity',0.15).attr('stroke-dasharray','6,3');

  // Main bg
  catG.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r)
    .attr('fill',d=>d.data.color).attr('opacity',0.05);

  // Border
  catG.append('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r)
    .attr('fill','none').attr('stroke',d=>d.data.color).attr('stroke-width',1)
    .attr('stroke-opacity',0.25);

  // Category label background
  catG.append('rect')
    .attr('x',d=>d.x-55).attr('y',d=>d.y-d.r-18).attr('width',110).attr('height',16)
    .attr('rx',4).attr('fill','rgba(6,6,18,0.8)');

  // Label
  catG.append('text')
    .attr('x',d=>d.x).attr('y',d=>d.y-d.r-6)
    .attr('text-anchor','middle').attr('fill','#eee').attr('font-size',10).attr('font-weight',600)
    .text(d => `${d.data.icon} ${d.data.name} (${d.children.length})`);

  catG.style('cursor','pointer')
    .on('click',(e,d) => { e.stopPropagation(); zoomToCategory(d.data.name); });

  // === Draw article circles ===
  const artG = g.selectAll('g.article')
    .data(root.leaves()).join('g').attr('class','article')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .attr('cursor','pointer');

  artG.append('circle')
    .attr('r', d => Math.max(2.5, d.r))
    .attr('fill', d => d.parent.data.color)
    .attr('opacity', 0.6)
    .attr('stroke', d => d3.color(d.parent.data.color).brighter(0.8))
    .attr('stroke-width', 0.5);

  // Article label for larger bubbles
  artG.filter(d => d.r > 14).append('text')
    .attr('text-anchor','middle').attr('dy','0.3em')
    .attr('fill','#fff').attr('font-size', d => Math.min(9, d.r*0.6))
    .attr('pointer-events','none')
    .text(d => (d.data.name||'').slice(0, Math.floor(d.r/4)));

  // Interactions
  artG.on('click', (e,d) => { e.stopPropagation(); showDetail(d); })
    .on('mouseover', function(e,d) {
      d3.select(this).select('circle').attr('opacity',1).attr('stroke','#fff').attr('stroke-width',2);
      d3.select('#tooltip').style('display','block')
        .html(`<div class="tt-title">${(d.data.name||'').slice(0,40)}</div>
               <div class="tt-meta">${d.parent.data.icon} ${d.parent.data.name} · ${d.data.connections||0}条连接</div>`)
        .style('left',(e.pageX+10)+'px').style('top',(e.pageY-35)+'px');
    })
    .on('mousemove', e => d3.select('#tooltip').style('left',(e.pageX+10)+'px').style('top',(e.pageY-35)+'px'))
    .on('mouseout', function() { d3.select(this).select('circle').attr('opacity',0.6).attr('stroke',d=>d3.color(d.parent.data.color).brighter(0.8)).attr('stroke-width',0.5); d3.select('#tooltip').style('display','none'); });

  drawCrossLinks();
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
}

function drawCrossLinks() {
  if (!showLinks) return;
  const linkG = g.append('g').attr('class','cross-links').lower();

  const valid = crossLinks.filter(l => {
    const s = allArticleNodes[l.source], t = allArticleNodes[l.target];
    return s && t && s.cat !== t.cat;
  });

  linkG.selectAll('line')
    .data(valid.slice(0, 2500))
    .join('line')
    .attr('x1',d=>allArticleNodes[d.source]?.x||0).attr('y1',d=>allArticleNodes[d.source]?.y||0)
    .attr('x2',d=>allArticleNodes[d.target]?.x||0).attr('y2',d=>allArticleNodes[d.target]?.y||0)
    .attr('stroke', d => d.type==='series' ? 'rgba(0,200,255,0.2)' : 'rgba(255,100,100,0.06)')
    .attr('stroke-width', d => d.type==='series' ? 1 : 0.3)
    .attr('stroke-dasharray', d => d.type==='series' ? null : '2,3')
    .attr('opacity', 0.6);
}

    .attr('text-anchor','middle').attr('dy','0.3em')
    .attr('fill','#fff').attr('font-size', d => Math.min(10, d.r*0.5))
    .attr('pointer-events','none')
    .text(d => (d.data.name||'').slice(0, Math.floor(d.r/3.5)));

  artG.on('click',(e,d)=>{e.stopPropagation();showDetail(d);})
    .on('mouseover',function(e,d){
      d3.select(this).select('circle').attr('opacity',1).attr('stroke','#fff').attr('stroke-width',2.5);
      d3.select('#tooltip').style('display','block')
        .html(`<div class="tt-title">${(d.data.name||'').slice(0,45)}</div><div class="tt-meta">${d.data.connections||0}条连接</div>`)
        .style('left',(e.pageX+10)+'px').style('top',(e.pageY-35)+'px');
    })
    .on('mousemove',e=>d3.select('#tooltip').style('left',(e.pageX+10)+'px').style('top',(e.pageY-35)+'px'))
    .on('mouseout',function(){d3.select(this).select('circle').attr('opacity',0.65).attr('stroke','#fff').attr('stroke-width',0.7);d3.select('#tooltip').style('display','none');});

  root.leaves().forEach(d => { allArticleNodes[d.data.id] = { x:cx+d.x-root.x, y:cy+d.y-root.y, r:d.r, cat:catName, color:cat.color }; });
  drawCrossLinks();
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
}

function zoomOut() { document.getElementById('detail-panel').classList.remove('show'); renderOverview(); }

function showDetail(d) {
  const panel = document.getElementById('detail-panel'), content = document.getElementById('detail-content');
  panel.classList.add('show');
  const data = d.data;
  const related = [];
  crossLinks.forEach(l => {
    const target = (l.source===data.id) ? l.target : (l.target===data.id) ? l.source : null;
    if (target && allArticleNodes[target]) {
      const arts = hierarchy.children.flatMap(c=>c.children);
      const tn = arts.find(a=>a.id===target);
      if (tn) related.push({ title:tn.name, type:l.type, cat:allArticleNodes[target].cat });
    }
  });

  const tNames = { series:'📚 系列', cross:'🔀 跨领域', weak_cross:'🔀 弱关联' };
  const grouped = {}; related.forEach(r => { const t=r.type; if(!grouped[t])grouped[t]=[]; grouped[t].push(r); });

  let relH = '';
  for(const [t,items] of Object.entries(grouped)) {
    relH += `<div class="section-title">${tNames[t]||t} (${items.length})</div><div>`;
    items.slice(0,8).forEach(r => relH += `<span class="tag link" style="border-left:2px solid ${d.parent?.data?.color||'#666'}">${(r.title||'').slice(0,28)}...</span>`);
    relH += '</div>';
  }

  content.innerHTML = `
    <h3>${data.name||''}</h3>
    <span class="badge" style="background:${d.parent?.data?.color||'#666'}">${d.parent?.data?.icon||''} ${d.parent?.data?.name||''}</span>
    <div style="font-size:9px;color:var(--text-dim);margin:3px 0">🔗 ${data.connections||0}条关联 · 跨领域${related.length}条</div>
    ${data.preview?`<div class="preview">${data.preview.replace(/</g,'&lt;')}...</div>`:''}
    ${data.keywords?.length?`<div class="section-title">🏷️ 关键词</div><div>${data.keywords.slice(0,12).map(k=>`<span class="tag">${k}</span>`).join('')}</div>`:''}
    ${relH}`;
  document.getElementById('close-detail').onclick = () => panel.classList.remove('show');
}

function toggleLinks() { showLinks=!showLinks; document.querySelectorAll('#controls button')[1].classList.toggle('active',showLinks); if(currentZoom) zoomToCategory(currentZoom); else renderOverview(); }
function toggleLayout() { /* reserved for force layout */ }
function resetAll() { document.getElementById('detail-panel').classList.remove('show'); document.querySelectorAll('#category-list li').forEach(l=>l.classList.remove('active')); renderOverview(); svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity); }
function highlightArticles(q) {
  g.selectAll('g.article circle').attr('opacity', function() {
    const d = d3.select(this.parentNode).datum();
    const name = (d?.data?.name||'').toLowerCase(), kws = (d?.data?.keywords||[]).join(' ').toLowerCase();
    return (name.includes(q)||kws.includes(q)) ? 1 : 0.06;
  }).attr('stroke', function() {
    const d = d3.select(this.parentNode).datum();
    return (d?.data?.name||'').toLowerCase().includes(q) ? '#fff' : null;
  }).attr('stroke-width', function() {
    const d = d3.select(this.parentNode).datum();
    return (d?.data?.name||'').toLowerCase().includes(q) ? 2.5 : 0.5;
  });
}
function resetHighlights() {
  g.selectAll('g.article circle').attr('opacity',0.6).attr('stroke',function(){
    const d=d3.select(this.parentNode).datum();
    return d3.color(d?.parent?.data?.color||'#666').brighter(0.8);
  }).attr('stroke-width',0.5);
}
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){zoomOut();document.getElementById('detail-panel').classList.remove('show');}
  if(e.key==='f'&&e.ctrlKey){e.preventDefault();document.getElementById('search-box').focus();}
});
</script>
</body>
</html>
