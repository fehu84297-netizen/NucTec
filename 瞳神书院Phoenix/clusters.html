// ========== INITIALIZATION ==========
let svg, g, simulation, zoom;
let nodesData = [], linksData = [];
let categories = [];
let activeCategory = null;
let currentNode = null;
let labelsVisible = true;

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ========== LOAD DATA & BUILD ==========
(function init() {
  const data = EMBEDDED_DATA;
  nodesData = data.nodes;
  linksData = data.edges;
  categories = data.categories;

  document.getElementById("stats").textContent =
    `${data.totalFiles} 篇文章 · ${data.totalEdges} 条关联`;

  buildLegend();
  buildGraph();
  setupSearch();
  setupReset();
  setupLabelToggle();
})();

// ========== LEGEND ==========
function buildLegend() {
  const list = document.getElementById("legend-list");
  list.innerHTML = "";
  categories.forEach((cat, i) => {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `
      <span class="legend-dot" style="background:${cat.color}"></span>
      <span class="legend-label">${cat.label}</span>
      <span class="legend-count">${cat.count}</span>`;
    div.onclick = () => toggleCategory(i, div);
    list.appendChild(div);
  });
}

function toggleCategory(catIdx, el) {
  if (activeCategory === catIdx) {
    activeCategory = null;
    el.classList.remove("highlight");
    document.querySelectorAll(".legend-item").forEach(d => d.classList.remove("dim"));
  } else {
    activeCategory = catIdx;
    document.querySelectorAll(".legend-item").forEach((d, i) => {
      if (i === catIdx) { d.classList.add("highlight"); d.classList.remove("dim"); }
      else d.classList.add("dim");
    });
  }
  updateNodeDisplay();
}

function updateNodeDisplay() {
  g.selectAll("g.node-group")
    .transition().duration(300)
    .style("opacity", d => {
      if (activeCategory === null) return 1;
      return d.category === activeCategory ? 1 : 0.08;
    });

  g.selectAll(".link-line")
    .transition().duration(300)
    .style("opacity", d => {
      if (activeCategory === null) return 0.4;
      const sCat = nodesData.find(n => n.id === d.source.id)?.category;
      const tCat = nodesData.find(n => n.id === d.target.id)?.category;
      return (sCat === activeCategory || tCat === activeCategory) ? 0.6 : 0.03;
    });
}

// ========== GRAPH ==========
function buildGraph() {
  svg = d3.select("#graph");

  // Zoom behavior
  zoom = d3.zoom()
    .scaleExtent([0.2, 6])
    .on("zoom", zoomed);

  svg.call(zoom);

  g = svg.append("g");

  // Prepare data for force simulation
  const nodes = nodesData.map((n, i) => ({ ...n, index: i }));
  const links = linksData.map(e => ({
    source: e.source,
    target: e.target,
    weight: e.weight
  }));

  // Force simulation - compute category angles from actual data
  const allCatIndices = [...new Set(nodes.map(n => n.category))].sort();
  const catAngles = {};
  allCatIndices.forEach((catIdx, i) => {
    catAngles[catIdx] = (2 * Math.PI * i) / allCatIndices.length;
  });

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => 55 - d.weight * 1.5).strength(d => d.weight * 0.015))
    .force("charge", d3.forceManyBody().strength(-80))
    .force("center", d3.forceCenter(W() / 2, H() / 2))
    .force("collision", d3.forceCollide().radius(d => Math.max(14, d.degree * 1.2 + 8)))
    .force("x", d3.forceX(W() / 2).strength(0.005))
    .force("y", d3.forceY(H() / 2).strength(0.005))
    // Radial force: push nodes toward category-based angle
    .force("radial", alpha => {
      const cx = W() / 2, cy = H() / 2;
      nodes.forEach(d => {
        const angle = catAngles[d.category] || 0;
        const r = 180 + d.catCount * 0.8;
        d.vx += (cx + r * Math.cos(angle) - d.x) * alpha * 0.008;
        d.vy += (cy + r * Math.sin(angle) - d.y) * alpha * 0.008;
      });
    });

  // Draw links
  const link = g.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link-line")
    .attr("stroke-width", d => Math.max(0.5, d.weight * 0.3));

  // Draw nodes
  const nodeGroup = g.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("class", "node-group")
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended))
    .on("click", (event, d) => showInfo(event, d))
    .on("dblclick", (event, d) => openFile(d));

  // Node circles
  nodeGroup.append("circle")
    .attr("class", "node-circle")
    .attr("r", d => Math.max(3, d.degree * 0.6 + 5))
    .attr("fill", d => d.color)
    .attr("fill-opacity", 0.85);

  // Node labels
  nodeGroup.append("text")
    .attr("class", "node-label")
    .attr("dy", d => Math.max(3, d.degree * 0.6 + 5) + 12)
    .text(d => d.label)
    .attr("font-size", d => Math.max(9, Math.min(14, d.degree * 0.4 + 9)));

  // Simulation tick
  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Initial zoom to fit
  setTimeout(() => {
    const bounds = g.node().getBBox();
    const dx = bounds.width;
    const dy = bounds.height;
    const x = bounds.x + dx / 2;
    const y = bounds.y + dy / 2;
    const scale = 0.75 / Math.max(dx / W(), dy / H(), 1);
    svg.transition().duration(750).call(
      zoom.transform,
      d3.zoomIdentity.translate(W() / 2 - scale * x, H() / 2 - scale * y).scale(scale)
    );
  }, 1500);
}

// ========== ZOOM with dynamic font sizing ==========
function zoomed(event) {
  g.attr("transform", event.transform);

  // Skip label font recalc when labels are hidden
  if (!labelsVisible) return;

  // Dynamic font size: inversely proportional to zoom scale
  const k = event.transform.k;
  const baseSize = 11;
  const adjustedSize = baseSize / Math.sqrt(k);

  g.selectAll(".node-label")
    .attr("font-size", d => {
      const raw = Math.max(9, Math.min(14, d.degree * 0.4 + 9));
      return raw / Math.sqrt(k);
    });

  // Adjust circle radius on zoom (keep visually consistent size)
  g.selectAll(".node-circle")
    .attr("stroke-width", 1.5 / Math.sqrt(k));
}

// ========== DRAG ==========
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ========== INFO PANEL & FILE OPENING ==========
function showInfo(event, d) {
  event.stopPropagation();
  currentNode = d;
  document.getElementById("tt-title").textContent = d.label;
  document.getElementById("tt-cat").textContent = `📁 ${d.categoryLabel}`;
  document.getElementById("tt-kw").textContent = d.keywords ? `关键词：${d.keywords.slice(0,8).join(' · ')}` : '';
  document.getElementById("tooltip").style.display = "block";

  // Highlight connected nodes
  g.selectAll(".node-group").style("opacity", n => {
    if (n.id === d.id) return 1;
    const connected = linksData.some(e =>
      (e.source === d.id && e.target === n.id) ||
      (e.target === d.id && e.source === n.id));
    return connected ? 0.6 : 0.1;
  });
  g.selectAll(".link-line").style("opacity", l =>
    (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.03
  );

  document.getElementById("tt-btn").onclick = () => openFile(d);
}

function openFile(d) {
  // Build proper file:// URL with encoded filename
  const basePath = window.location.href.replace(/clusters\.html.*$/, '');
  // Use encodeURI to preserve path separators while encoding Chinese chars
  const fileUrl = basePath + encodeURI(d.id);
  const win = window.open(fileUrl, '_blank');
  if (!win) {
    // Fallback: show path for manual copy
    const fullPath = decodeURI(fileUrl.replace('file:///', '').replace(/^\//, ''));
    alert('浏览器阻止了弹窗。文件路径：\n' + fullPath.replace(/\//g, '\\'));
  }
}

// Click on background to deselect
svg.on("click", () => {
  currentNode = null;
  document.getElementById("tooltip").style.display = "none";
  g.selectAll(".node-group").style("opacity", 1);
  g.selectAll(".link-line").style("opacity", 0.4);
  if (activeCategory !== null) updateNodeDisplay();
});

// ========== SEARCH ==========
function setupSearch() {
  const input = document.getElementById("search");
  let debounce;
  input.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => doSearch(input.value.trim()), 300);
  });
}

function doSearch(query) {
  if (!query) {
    g.selectAll(".node-group").style("opacity", 1).style("display", null);
    g.selectAll(".link-line").style("opacity", 0.4);
    return;
  }
  const q = query.toLowerCase();
  const matchedIds = new Set();
  nodesData.forEach(n => {
    const txt = (n.label + " " + (n.keywords || []).join(" ") + " " + n.categoryLabel).toLowerCase();
    if (txt.includes(q)) matchedIds.add(n.id);
  });

  g.selectAll(".node-group")
    .style("opacity", d => matchedIds.has(d.id) ? 1 : 0.06)
    .style("display", d => matchedIds.has(d.id) ? null : "none");

  g.selectAll(".link-line")
    .style("opacity", d => {
      return (matchedIds.has(d.source.id) && matchedIds.has(d.target.id)) ? 0.9 : 0.02;
    });
}

function setupReset() {
  document.getElementById("btn-reset").addEventListener("click", () => {
    document.getElementById("search").value = "";
    activeCategory = null;
    currentNode = null;
    document.getElementById("tooltip").style.display = "none";
    document.querySelectorAll(".legend-item").forEach(d => d.classList.remove("highlight","dim"));
    g.selectAll(".node-group").style("opacity", 1).style("display", null);
    g.selectAll(".link-line").style("opacity", 0.4);

    // Reset zoom
    const bounds = g.node().getBBox();
    const dx = bounds.width;
    const dy = bounds.height;
    const x = bounds.x + dx / 2;
    const y = bounds.y + dy / 2;
    const scale = 0.75 / Math.max(dx / W(), dy / H(), 1);
    svg.transition().duration(750).call(
      zoom.transform,
      d3.zoomIdentity.translate(W() / 2 - scale * x, H() / 2 - scale * y).scale(scale)
    );
  });
}

// ========== LABEL TOGGLE ==========
function setupLabelToggle() {
  const btn = document.getElementById("btn-toggle-labels");
  btn.addEventListener("click", () => {
    labelsVisible = !labelsVisible;
    const labels = g.selectAll(".node-label");
    if (labelsVisible) {
      // Show labels and restore correct font size for current zoom level
      const k = d3.zoomTransform(svg.node()).k;
      labels
        .style("display", null)
        .attr("font-size", d => {
          const raw = Math.max(9, Math.min(14, d.degree * 0.4 + 9));
          return raw / Math.sqrt(k);
        });
      btn.textContent = "🏷️ 隐藏文字";
      btn.classList.remove("active");
    } else {
      labels.style("display", "none");
      btn.textContent = "🏷️ 显示文字";
      btn.classList.add("active");
    }
  });
}

// Handle resize
window.addEventListener("resize", () => {
  if (simulation) simulation.force("center", d3.forceCenter(W() / 2, H() / 2)).restart();
});
</script>
